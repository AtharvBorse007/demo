name: Deploy Pages
on: 
  push:
    branches: [ main ]
permissions: 
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ububuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifacts@v3
        with:
          path:
      - uses: actions/deploy-pages@v4    
  
    
      
